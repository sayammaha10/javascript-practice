<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <h1>Rock Paper Scissors</h1>
    </header>
    <!-- Header End -->

    <!-- ScoreBoard -->
    <div class="score-board">
      <div id="user-badge" class="badge">User</div>
      <div id="comp-badge" class="badge">Comp</div>
      <span id="user-score">0</span>:<span id="comp-score">0</span>
    </div>
    <!-- ScoreBoard End -->

    <!-- Result -->
    <div class="result">
      <p>Paper covers Rock. You win!</p>
    </div>
    <!-- Reuslt End -->

    <!-- Options -->
    <div class="choices">
      <div id="r" class="options">
        <img src="Images/Rock.png" />
      </div>
      <div id="p" class="options">
        <img src="Images/Paper.png" />
      </div>
      <div id="s" class="options">
        <img src="Images/Scissors.png" />
      </div>
    </div>
    <!-- Options End -->

    <!-- Action -->
    <p id="action">Make your move!</p>
    <!-- Action End -->

    <script src="app.js" charset="utf-8"></script>
  </body>
</html>
