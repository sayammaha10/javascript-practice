<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Subscription Form</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="hero">
      <h3>Coming Soon!</h3>
      <h1>Our Brand New<br />Website Is On Its Way</h1>
      <p>Subscribe for more details.</p>
      <form name="submit-to-google-sheet">
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required
        />
        <button type="submit">
          <img src="./images/send-icon.png" width="30px" />
        </button>
      </form>
      <span id="message"></span>
    </div>
    <!-- javascript -->
    <script>
      const scriptURL =
        "https://script.google.com/macros/s/AKfycbxYn5Ib5xRjdJH-6ZXucvtKI7UWqZtg7fSAH5ja4lIR2DXs2qSaAaCtWeIKJKpO2qNQ/exec";
      const form = document.forms["submit-to-google-sheet"];
      const message = document.getElementById("message");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        fetch(scriptURL, { method: "POST", body: new FormData(form) })
          .then((response) => {
            message.textContent = "Thank You For Subscribing!";
            setTimeout(function () {
              message.textContent = "";
            }, 5000);
            form.reset();
          })
          .catch((error) => console.error("Error!", error.message));
      });
    </script>
  </body>
</html>
